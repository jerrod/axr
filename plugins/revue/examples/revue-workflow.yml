# Example GitHub Actions workflow for Revue code reviews.
# Copy this to .github/workflows/revue.yml in your repository.
#
# SECURITY HARDENING (recommended before adopting in production):
#   1. Pin every `uses:` action to a full commit SHA, not a version tag.
#      Example: uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
#      Tags can be force-moved by the action author; SHAs cannot. See:
#      https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions
#   2. Pin the auto-claude container image to a digest, not :latest.
#      Example: ghcr.io/arqu-co/auto-claude@sha256:<digest>
#      Look up the current digest from https://github.com/arqu-co/auto-claude/pkgs/container/auto-claude
#   3. If you run on self-hosted runners, replace the world-writable /tmp/revue-logs
#      mount below with a per-job temp dir (already done in this template via mktemp).
#   4. Be aware that the `pull_request` trigger (line 7) processes diffs from any
#      contributor — including first-time external contributors on public repos.
#      The four reviewer agents read the diff as untrusted input. The `review-pr`
#      skill instructs them to treat diff content as data, not commands, but a
#      determined attacker may still attempt prompt injection. Review revue's
#      findings before merging — do not auto-merge based on revue's verdict alone.

name: Revue Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  review:
    name: Revue
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && (contains(github.event.comment.body, '@revue') || contains(github.event.comment.body, '/review'))
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Acknowledge review request
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7  # SECURITY: pin to SHA in production
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - uses: actions/checkout@v4  # SECURITY: pin to SHA in production
        with:
          fetch-depth: 0

      - uses: docker/login-action@v3  # SECURITY: pin to SHA in production
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull auto-claude image
        # SECURITY: replace :latest with @sha256:<digest> in production. The
        # :latest tag is mutable and silently rolls forward on every release.
        run: docker pull ghcr.io/arqu-co/auto-claude:latest

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "mode=respond" >> "$GITHUB_OUTPUT"
            echo "comment_id=${{ github.event.comment.id }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=review" >> "$GITHUB_OUTPUT"
            echo "comment_id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Revue
        run: |
          # Per-job log dir avoids the cross-job leak risk of a shared /tmp
          # path on self-hosted runners. mktemp -d returns a 0700-mode dir.
          REVUE_LOG_DIR="$(mktemp -d)"
          echo "REVUE_LOG_DIR=$REVUE_LOG_DIR" >> "$GITHUB_ENV"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${REVUE_LOG_DIR}:/tmp/revue-logs" \
            -w /workspace \
            -e CLAUDE_CODE_OAUTH_TOKEN \
            -e CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 \
            -e REVUE_APP_ID \
            -e REVUE_APP_PRIVATE_KEY \
            -e REVUE_INSTALLATION_ID \
            -e "REVUE_PR_NUMBER=${PR_NUMBER}" \
            -e "REVUE_REPO=${REVUE_REPO}" \
            -e "REVUE_MODE=${REVUE_MODE}" \
            -e "REVUE_COMMENT_ID=${REVUE_COMMENT_ID}" \
            -e REVUE_MAX_BUDGET_USD=5.00 \
            ghcr.io/arqu-co/auto-claude:latest revue
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          REVUE_APP_ID: ${{ secrets.REVUE_APP_ID }}
          REVUE_APP_PRIVATE_KEY: ${{ secrets.REVUE_APP_PRIVATE_KEY }}
          REVUE_INSTALLATION_ID: ${{ secrets.REVUE_INSTALLATION_ID }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.issue.number }}
          REVUE_REPO: ${{ github.repository }}
          REVUE_MODE: ${{ steps.mode.outputs.mode }}
          REVUE_COMMENT_ID: ${{ steps.mode.outputs.comment_id }}

      - name: Upload review logs
        uses: actions/upload-artifact@v4  # SECURITY: pin to SHA in production
        if: always()
        with:
          name: revue-logs-${{ github.event.pull_request.number || github.event.issue.number }}
          path: |
            ${{ env.REVUE_LOG_DIR }}/review.json
            ${{ env.REVUE_LOG_DIR }}/response.json
            ${{ env.REVUE_LOG_DIR }}/stats.json
            ${{ env.REVUE_LOG_DIR }}/result.txt
            ${{ env.REVUE_LOG_DIR }}/agent-*.json
            ${{ env.REVUE_LOG_DIR }}/artifacts/
          retention-days: 14
