# Example GitHub Actions workflow for Revue code reviews.
# Copy this to .github/workflows/revue.yml in your repository.

name: Revue Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  review:
    name: Revue
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && (contains(github.event.comment.body, '@revue') || contains(github.event.comment.body, '/review'))
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Acknowledge review request
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull auto-claude image
        run: docker pull ghcr.io/arqu-co/auto-claude:latest

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "mode=respond" >> "$GITHUB_OUTPUT"
            echo "comment_id=${{ github.event.comment.id }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=review" >> "$GITHUB_OUTPUT"
            echo "comment_id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Revue
        run: |
          mkdir -p /tmp/revue-logs && chmod 777 /tmp/revue-logs
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "/tmp/revue-logs:/tmp/revue-logs" \
            -w /workspace \
            -e CLAUDE_CODE_OAUTH_TOKEN \
            -e REVUE_APP_ID \
            -e REVUE_APP_PRIVATE_KEY \
            -e REVUE_INSTALLATION_ID \
            -e "REVUE_PR_NUMBER=${PR_NUMBER}" \
            -e "REVUE_REPO=${REVUE_REPO}" \
            -e "REVUE_MODE=${REVUE_MODE}" \
            -e "REVUE_COMMENT_ID=${REVUE_COMMENT_ID}" \
            -e REVUE_MAX_BUDGET_USD=5.00 \
            ghcr.io/arqu-co/auto-claude:latest revue
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          REVUE_APP_ID: ${{ secrets.REVUE_APP_ID }}
          REVUE_APP_PRIVATE_KEY: ${{ secrets.REVUE_APP_PRIVATE_KEY }}
          REVUE_INSTALLATION_ID: ${{ secrets.REVUE_INSTALLATION_ID }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.issue.number }}
          REVUE_REPO: ${{ github.repository }}
          REVUE_MODE: ${{ steps.mode.outputs.mode }}
          REVUE_COMMENT_ID: ${{ steps.mode.outputs.comment_id }}

      - name: Upload review logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: revue-logs-${{ github.event.pull_request.number || github.event.issue.number }}
          path: |
            /tmp/revue-logs/review.json
            /tmp/revue-logs/response.json
            /tmp/revue-logs/stats.json
            /tmp/revue-logs/result.txt
            /tmp/revue-logs/agent-*.json
            /tmp/revue-logs/artifacts/
          retention-days: 14
